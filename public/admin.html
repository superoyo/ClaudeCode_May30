<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบหลังบ้าน - รายชื่อผู้ลงทะเบียน</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Thai", sans-serif;
      margin: 0;
      background: #fdf2f8;
      color: #831843;
    }
    header {
      background: linear-gradient(135deg, #9d174d 0%, #db2777 100%);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header button {
      background: transparent;
      color: #fff;
      border: 1px solid #fff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    header button:hover { background: rgba(255,255,255,0.1); }
    .container { max-width: 1100px; margin: 24px auto; padding: 0 24px; }
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .stats {
      background: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
      font-size: 14px;
    }
    .stats strong { color: #db2777; font-size: 18px; }
    .actions { display: flex; gap: 8px; }
    .actions input {
      padding: 8px 12px;
      font-size: 14px;
      border: 1.5px solid #e2e2e8;
      border-radius: 8px;
      outline: none;
      min-width: 240px;
    }
    .actions button, .actions a.btn {
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: #db2777;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .actions button:hover, .actions a.btn:hover { background: #be185d; }
    .table-wrap {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left;
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid #eee;
    }
    th {
      background: #fafbfc;
      font-weight: 600;
      color: #555;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    tr:hover td { background: #fafbfc; }
    td.phone { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 600; }
    td.actions-cell { text-align: right; }
    .del-btn {
      background: transparent;
      color: #c62828;
      border: 1px solid #fadcdc;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .del-btn:hover { background: #fff0f0; }
    .empty { padding: 60px 20px; text-align: center; color: #888; }
  </style>
</head>
<body>
  <header>
    <h1>ระบบหลังบ้าน — รายชื่อผู้ลงทะเบียน</h1>
    <button id="logoutBtn">ออกจากระบบ</button>
  </header>

  <div class="container">
    <div class="toolbar">
      <div class="stats">ทั้งหมด <strong id="count">0</strong> รายการ</div>
      <div class="actions">
        <input type="search" id="search" placeholder="ค้นหาเบอร์โทร..." />
        <button id="refreshBtn">รีเฟรช</button>
        <a class="btn" id="exportBtn" href="#">ดาวน์โหลด CSV</a>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:60px">#</th>
            <th>เบอร์โทรศัพท์</th>
            <th>วันเวลาที่ลงทะเบียน</th>
            <th>IP</th>
            <th style="width:100px"></th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="5" class="empty">กำลังโหลด...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let allRows = [];

    function formatDate(s) {
      if (!s) return '';
      const d = new Date(s);
      if (isNaN(d)) return s;
      return d.toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' });
    }

    function render(rows) {
      const tbody = document.getElementById('tbody');
      document.getElementById('count').textContent = rows.length;
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">ยังไม่มีผู้ลงทะเบียน</td></tr>';
        return;
      }
      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${r.id}</td>
          <td class="phone">${escapeHtml(r.phone)}</td>
          <td>${formatDate(r.created_at)}</td>
          <td>${escapeHtml(r.ip || '-')}</td>
          <td class="actions-cell"><button class="del-btn" data-id="${r.id}">ลบ</button></td>
        </tr>
      `).join('');
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    async function load() {
      const res = await fetch('/api/registrations');
      if (res.status === 401) { location.href = '/login.html'; return; }
      const data = await res.json();
      allRows = data.rows || [];
      applyFilter();
    }

    function applyFilter() {
      const q = document.getElementById('search').value.trim();
      const filtered = q ? allRows.filter(r => r.phone.includes(q)) : allRows;
      render(filtered);
    }

    document.getElementById('search').addEventListener('input', applyFilter);
    document.getElementById('refreshBtn').addEventListener('click', load);

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      location.href = '/login.html';
    });

    document.getElementById('tbody').addEventListener('click', async (e) => {
      const btn = e.target.closest('.del-btn');
      if (!btn) return;
      const id = btn.dataset.id;
      if (!confirm(`ลบรายการ #${id} ?`)) return;
      const res = await fetch('/api/registrations/' + id, { method: 'DELETE' });
      if (res.ok) load();
    });

    document.getElementById('exportBtn').addEventListener('click', (e) => {
      e.preventDefault();
      const rows = allRows;
      const header = ['id', 'phone', 'created_at', 'ip'];
      const csv = [header.join(',')]
        .concat(rows.map(r => header.map(k => `"${String(r[k] ?? '').replace(/"/g, '""')}"`).join(',')))
        .join('\n');
      const blob = new Blob([`﻿${csv}`], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `registrations-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    });

    load();
  </script>
</body>
</html>
