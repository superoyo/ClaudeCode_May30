<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ลงทะเบียน</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Thai", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f9a8d4 0%, #be185d 100%);
      padding: 20px;
    }
    .card {
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
    }
    h1 { margin: 0 0 8px; font-size: 24px; color: #1a1a2e; }
    p.sub { margin: 0 0 24px; color: #666; font-size: 14px; }
    label { display: block; font-size: 13px; color: #444; margin-bottom: 6px; font-weight: 600; }
    input[type="tel"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1.5px solid #e2e2e8;
      border-radius: 8px;
      outline: none;
      transition: border-color .15s;
    }
    input[type="tel"]:focus { border-color: #db2777; }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: #db2777;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #be185d; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .msg { margin-top: 14px; font-size: 14px; text-align: center; min-height: 20px; }
    .msg.ok { color: #2e7d32; }
    .msg.err { color: #c62828; }
    .footer { margin-top: 24px; text-align: center; font-size: 12px; color: #999; }
    .footer a { color: #db2777; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ลงทะเบียน</h1>
    <p class="sub">กรอกเบอร์โทรศัพท์เพื่อรับข้อมูลเพิ่มเติม</p>
    <form id="form">
      <label for="phone">เบอร์โทรศัพท์</label>
      <input type="tel" id="phone" name="phone" placeholder="08x-xxx-xxxx" required autocomplete="tel" />
      <button type="submit" id="btn">ลงทะเบียน</button>
      <div class="msg" id="msg"></div>
    </form>
    <div class="footer">
      <a href="/login.html">เข้าระบบหลังบ้าน</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      msg.className = 'msg';
      btn.disabled = true;
      btn.textContent = 'กำลังส่ง...';

      const phone = document.getElementById('phone').value.trim();
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        const data = await res.json();
        if (res.ok) {
          msg.textContent = '✓ ลงทะเบียนสำเร็จ ขอบคุณครับ';
          msg.classList.add('ok');
          form.reset();
        } else {
          msg.textContent = data.error || 'เกิดข้อผิดพลาด';
          msg.classList.add('err');
        }
      } catch (err) {
        msg.textContent = 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้';
        msg.classList.add('err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'ลงทะเบียน';
      }
    });
  </script>
</body>
</html>
