<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าระบบหลังบ้าน</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Thai", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e40af 0%, #0c1e5c 100%);
      padding: 20px;
    }
    .card {
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 380px;
    }
    h1 { margin: 0 0 24px; font-size: 22px; color: #1e3a8a; text-align: center; }
    label { display: block; font-size: 13px; color: #444; margin-bottom: 6px; font-weight: 600; }
    input {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 1.5px solid #e2e2e8;
      border-radius: 8px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color .15s;
    }
    input:focus { border-color: #2563eb; }
    button {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: #2563eb;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .msg { margin-top: 14px; font-size: 14px; text-align: center; min-height: 20px; color: #c62828; }
    .footer { margin-top: 20px; text-align: center; font-size: 12px; color: #999; }
    .footer a { color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>เข้าระบบหลังบ้าน</h1>
    <form id="form">
      <label for="username">ชื่อผู้ใช้</label>
      <input type="text" id="username" name="username" required autocomplete="username" />
      <label for="password">รหัสผ่าน</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />
      <button type="submit" id="btn">เข้าสู่ระบบ</button>
      <div class="msg" id="msg"></div>
    </form>
    <div class="footer">
      <a href="/">← กลับหน้าลงทะเบียน</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      btn.disabled = true;
      btn.textContent = 'กำลังเข้าสู่ระบบ...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          location.href = '/admin.html';
        } else {
          msg.textContent = data.error || 'เข้าสู่ระบบไม่สำเร็จ';
        }
      } catch (err) {
        msg.textContent = 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้';
      } finally {
        btn.disabled = false;
        btn.textContent = 'เข้าสู่ระบบ';
      }
    });
  </script>
</body>
</html>
